lang: "ko"

project:
  type: website
  output-dir: docs
  render:
    - content/index.qmd
    - content/project/overview.qmd
    - content/notes/index.qmd
    - content/references.qmd
    - literature/index.qmd
    - literature/reading_list.qmd
    - literature/finance/index.qmd
    - literature/cs/index.qmd
    - experiments/index.qmd
    - experiments/1day_prediction.qmd
    - experiments/22day_prediction.qmd
    - experiments/sci_verification.qmd
    - experiments/phase10_v29_verification.qmd
    - experiments/phase13_model_comparison.qmd
    - experiments/trading_strategy.qmd
    - experiments/universal_model.qmd
    - experiments/summary.qmd

website:
  title: "VRP 연구 대시보드"
  navbar:
    left:
      - href: content/index.qmd
        text: 홈
      - href: content/project/overview.qmd
        text: 프로젝트
      - href: literature/index.qmd
        text: 문헌 분석
      - href: experiments/index.qmd
        text: 실험 결과
      - href: content/notes/index.qmd
        text: 노트
    right:
      - icon: github
        href: https://github.com
  
  sidebar:
    - title: "프로젝트 정보"
      contents:
        - content/project/overview.qmd
    
    - title: "문헌 리뷰"
      contents:
        - href: literature/index.qmd
          text: 개요
        - section: "금융"
          contents:
            - literature/finance/index.qmd
        - section: "컴퓨터 공학"
          contents:
            - literature/cs/index.qmd
        - href: literature/reading_list.qmd
          text: 읽기 목록

    - title: "실험 결과"
      contents:
        - href: experiments/index.qmd
          text: 개요
        - section: "1일 예측"
          contents:
            - href: experiments/1day_prediction.qmd
              text: V50 모델 (챔피언)
            - href: experiments/sci_verification.qmd
              text: 상세 검증
        - section: "22일 예측"
          contents:
            - href: experiments/22day_prediction.qmd
              text: V36 모델 (챔피언)
        - section: "기타"
          contents:
            - href: experiments/phase10_v29_verification.qmd
              text: V29 베이스라인 검증
            - href: experiments/phase13_model_comparison.qmd
              text: 모델 아키텍처 비교
            - href: experiments/trading_strategy.qmd
              text: 트레이딩 전략
            - href: experiments/universal_model.qmd
              text: 통합 모델 실험
            - href: experiments/summary.qmd
              text: 결과 요약

  page-footer:
    left: "Cross-Asset Volatility Risk Premium 예측 연구"
    right: "Quarto로 제작됨 | 2026"

format:
  html:
    theme: cosmo
    css: styles/styles.css
    toc: true
    toc-depth: 3
    code-fold: show
    code-tools: true
    code-copy: true
    fig-width: 10
    fig-height: 6
    execute:
      echo: true
      warning: false
      message: false

execute:
  freeze: auto
  cache: false
